<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="CaixaPro - Gestão Tirzepatida"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>CaixaPro</title>
  <style>
    /* DARK (padrão) */
    :root {
      --bg:#080a14; --bg2:#0b0d1a; --bg3:#0d0f1a; --bg4:#12141f;
      --card:#0d0f1a; --inp:#12141f; --pill:#080a14;
      --bdr:#1e2130; --bdr2:#252840; --sep:#151728;
      --tx:#e8eaf6; --tx2:#c4c8e8; --tx3:#8b8fa8;
      --tx4:#666a88; --tx5:#44475a; --tx6:#333550; --sub:#555870;
      --navon:#4f5ef0; --navoff:#666a88;
      --shadow:rgba(0,0,0,.6);
      --login-bg:linear-gradient(160deg,#0e1020,#090b16);
      --infobox:#080a18; --sumbox:#080a18;
      --acard:linear-gradient(135deg,#0e1030,#0d0f1a); --abdr:#2a2d58;
    }
    /* LIGHT */
    body.light {
      --bg:#f0f4ff; --bg2:#ffffff; --bg3:#ffffff; --bg4:#f5f7ff;
      --card:#ffffff; --inp:#f0f4ff; --pill:#eef1ff;
      --bdr:#dde1f5; --bdr2:#c8ceee; --sep:#e8ecf8;
      --tx:#1a1d3a; --tx2:#2d3060; --tx3:#555880;
      --tx4:#6668a0; --tx5:#8890b0; --tx6:#aab0cc; --sub:#7780aa;
      --navon:#4f5ef0; --navoff:#7780aa;
      --shadow:rgba(60,80,200,.12);
      --login-bg:#ffffff;
      --infobox:#eef1ff; --sumbox:#eef1ff;
      --acard:linear-gradient(135deg,#eef1ff,#f5f7ff); --abdr:#c8ceee;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
    input::placeholder{color:var(--tx5)}
    input:focus,select:focus{outline:2px solid #4f5ef0;outline-offset:-1px}
    button{cursor:pointer;transition:opacity .15s}
    button:hover:not(:disabled){opacity:.85}
  </style>
  <script>
    // Aplica tema ANTES do React pintar — sem flash
    try{if(localStorage.getItem('cpro:theme')==='light')document.body.classList.add('light')}catch(e){}
  </script>
</head>
<body><div id="root"></div></body>
</html>
