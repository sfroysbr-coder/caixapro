<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <meta name="description" content="CaixaPro - Gestão Tirzepatida"/>
    <link rel="manifest" href="/manifest.json"/>
    <title>CaixaPro</title>
    <script>
      // Aplica tema salvo ANTES do React carregar — evita tela preta
      try {
        var t = localStorage.getItem('cpro:theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        document.body.style.background = t === 'light' ? '#f0f4ff' : '#080a14';
      } catch(e) {
        document.body.style.background = '#080a14';
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', sans-serif; }
      [data-theme="dark"]  { background: #080a14; }
      [data-theme="light"] { background: #f0f4ff; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
